    <!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打包价管理</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            background: white;
            margin: 0;
            padding: 0;
        }

        .tabs-container {
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .tabs-header {
            display: flex;
            gap: 5px;
            padding: 10px 15px;
            border-bottom: 1px solid #e8f8f0;
            background: #fafdfb;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #e8f8f0;
            border-radius: 4px 4px 0 0;
            font-size: 14px;
            color: #1e9a6c;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: white;
            font-weight: bold;
        }

        .tab-close {
            font-size: 12px;
            color: #999;
        }

        .tab-close:hover {
            color: #ff4d4f;
        }

        .tabs-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .tab-action {
            font-size: 13px;
            color: #666;
            cursor: pointer;
            padding: 8px 12px;
        }

        .tab-action:hover {
            color: #1e9a6c;
        }

        .search-panel {
            padding: 15px;
            border-bottom: 1px solid #e8f8f0;
        }

        .search-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-item label {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
        }

        .search-item input,
        .search-item select {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            min-width: 150px;
        }

        .search-item input {
            min-width: 200px;
        }

        .search-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .table-panel {
            padding: 15px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .table-actions {
            display: flex;
            gap: 10px;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid #e8f8f0;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #f0f5f2;
            font-size: 13px;
            white-space: nowrap;
        }

        th {
            background: #fafdfb;
            font-weight: bold;
            color: #333;
        }

        td {
            color: #666;
        }

        tr:hover {
            background: #fafdfb;
        }

        .checkbox-cell input {
            width: 16px;
            height: 16px;
        }

        .action-links {
            display: flex;
            gap: 15px;
        }

        .action-link {
            color: #1e9a6c;
            text-decoration: none;
            font-size: 13px;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #fafdfb;
            border-top: 1px solid #e8f8f0;
        }

        .pagination-info {
            font-size: 13px;
            color: #666;
        }

        .pagination-nav {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pagination-nav button {
            padding: 4px 10px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
        }

        .pagination-nav button:hover:not(:disabled) {
            border-color: #1e9a6c;
            color: #1e9a6c;
        }

        .pagination-nav button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-nav button.active {
            background: #1e9a6c;
            color: white;
            border-color: #1e9a6c;
        }

        .pagination-select {
            padding: 4px 8px;
            border: 1px solid #d9d9d9;
            border-radius: 3px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="tabs-container">
        <div class="tabs-header">
            <div class="tab active">
                <span>打包价管理</span>
                <span class="tab-close">×</span>
            </div>
            <div class="tabs-actions">
                <span class="tab-action">关闭全部</span>
            </div>
        </div>

        <div class="search-panel">
            <div class="search-row">
                <div class="search-item">
                    <label>报送分类2:</label>
                    <input type="text" placeholder="请输入">
                </div>
                <div class="search-item">
                    <label>打包价名称:</label>
                    <input type="text" placeholder="请输入">
                </div>
                <div class="search-item">
                    <label>打包规则:</label>
                    <select>
                        <option value="">请选择</option>
                        <option value="single-price-add">单项价格相同，按个数加价</option>
                        <option value="fixed-total">固定总价</option>
                        <option value="single-price-add-limit">单项价格相同，按个数加价，有最高限价</option>
                        <option value="same-price-add">单价相同，按个数加价，有最高限价</option>
                    </select>
                </div>
                <div class="search-actions">
                    <button class="btn btn-secondary" onclick="resetSearch(this)">清空</button>
                    <button class="btn btn-primary" onclick="handleSearch('package')">查询</button>
                </div>
            </div>
        </div>

        <div class="table-panel">
            <div class="table-header">
                <div style="display:flex;gap:10px">
                    <button class="btn btn-primary" style="background:#1e9a6c;">导出本页</button>
                    <button class="btn btn-primary" style="background:#1e9a6c;">导出</button>
                    <button class="btn btn-primary" onclick="openModal('packageAddModal')">+ 新增</button>
                    <button class="btn btn-primary" style="background:#1e9a6c;">+ 复制新增</button>
                </div>
                <div class="table-actions">
                    <button class="btn btn-secondary">查询配置</button>
                    <button class="btn btn-secondary">表格配置</button>
                </div>
            </div>

            <div class="table-container">
                <table id="packageTable">
                    <thead>
                        <tr>
                            <th class="checkbox-cell"><input type="checkbox" onchange="toggleAllCheckboxes(this)"></th>
                            <th>序号</th>
                            <th>报送分类2</th>
                            <th>食品分类</th>
                            <th>打包价名称</th>
                            <th>打包规则</th>
                            <th>检验项目名称</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        const pageType = 'package';

        const packageDataList = [
            { id: '1', category2: '', foodCategory: '', packageName: '磺胺类', rule: '单项价格相同，按个数加价', items: '磺胺嘧啶,磺胺邻二甲氧嘧啶,磺胺间...' },
            { id: '2', category2: '', foodCategory: '', packageName: '磺胺类总量', rule: '固定总价', items: '甲氧苄啶,磺胺类（总量）' },
            { id: '3', category2: '', foodCategory: '', packageName: '脂肪酸', rule: '固定总价', items: '(花生酸+山嵛酸)/总脂肪酸,亚油酸/...' },
            { id: '4', category2: '', foodCategory: '', packageName: '青霉素类', rule: '单项价格相同，按个数加价', items: '双氯青霉素,乙氧萘胺青霉素,甲氧苯...' },
            { id: '5', category2: '', foodCategory: '', packageName: '氯酸盐高氯酸盐', rule: '单项价格相同，按个数加价', items: '高氯酸盐,氯酸盐' },
            { id: '6', category2: '', foodCategory: '', packageName: '农药', rule: '单价相同，按个数加价，有最高限价', items: '氯酸盐甲酯,特乐酚,灭螨醌,甲氧滴滴...' },
            { id: '7', category2: '', foodCategory: '', packageName: '氟虫腈', rule: '单项价格相同，按个数加价', items: '氟虫腈砜,氟虫腈亚砜,氟甲腈,氟虫腈' },
            { id: '8', category2: '', foodCategory: '', packageName: '氯丙那林非诺特罗', rule: '单项价格相同，按个数加价', items: '非诺特罗,氯丙那林' },
            { id: '9', category2: '', foodCategory: '', packageName: '头孢', rule: '单项价格相同，按个数加价', items: '头孢噻肟,头孢氨苄,头孢噻呋,头孢匹林' },
            { id: '10', category2: '', foodCategory: '', packageName: '硝喹', rule: '单项价格相同，按个数加价', items: '羟甲基甲硝唑喹啉,羟基甲硝唑,洛硝达...' }
        ];

        function generatePackageData() {
            const data = [];
            for (let i = 0; i < 28; i++) {
                const item = packageDataList[i % packageDataList.length];
                data.push({
                    id: Utils.generateId(),
                    category2: item.category2,
                    foodCategory: item.foodCategory,
                    packageName: item.packageName,
                    rule: item.rule,
                    items: item.items
                });
            }
            return data;
        }

        const packageData = generatePackageData();

        PageManager.init(pageType, packageData);

        function renderTable(pageType) {
            const tbody = document.getElementById('tableBody');
            const data = PageManager.getPageData(pageType);

            let html = '';
            data.forEach((item, index) => {
                html += '<tr>';
                html += `<td class="checkbox-cell"><input type="checkbox" data-id="${item.id}"></td>`;
                html += `<td>${(PageManager.currentPage[pageType] - 1) * PageManager.pageSize[pageType] + index + 1}</td>`;
                html += `<td>${item.category2 || ''}</td>`;
                html += `<td>${item.foodCategory || ''}</td>`;
                html += `<td>${item.packageName}</td>`;
                html += `<td>${item.rule}</td>`;
                html += `<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.items}</td>`;
                html += '<td><div class="action-links">';
                html += `<a href="#" class="action-link" onclick="handleEdit('${pageType}', '${item.id}')">编辑</a>`;
                html += `<a href="#" class="action-link" onclick="handleCopy('${pageType}', '${item.id}')">复制</a>`;
                html += `<a href="#" class="action-link" onclick="handleDelete('${pageType}', '${item.id}')">删除</a>`;
                html += '</div></td></tr>';
            });

            tbody.innerHTML = html;
        }

        function handleCopy(pageType, id) {
            console.log('复制:', pageType, id);
        }

        function renderPagination(pageType) {
            const pagination = document.getElementById('pagination');
            const currentPage = PageManager.currentPage[pageType];
            const totalPages = PageManager.getTotalPages(pageType);
            const totalCount = PageManager.data[pageType].length;
            const pageSize = PageManager.pageSize[pageType];

            pagination.innerHTML = PaginationTemplate.render(pageType, currentPage, totalPages, totalCount, pageSize);
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderTable(pageType);
            renderPagination(pageType);
        });
    </script>
</body>
</html>
