<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场信息查询</title>
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            background: white;
            margin: 0;
            padding: 0;
        }

        .tabs-container {
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .tabs-header {
            display: flex;
            gap: 5px;
            padding: 10px 15px;
            border-bottom: 1px solid #e8f8f0;
            background: #fafdfb;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #e8f8f0;
            border-radius: 4px 4px 0 0;
            font-size: 14px;
            color: #1e9a6c;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab.active {
            background: white;
            font-weight: bold;
        }

        .tab-close {
            font-size: 12px;
            color: #999;
        }

        .tab-close:hover {
            color: #ff4d4f;
        }

        .tabs-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .tab-action {
            font-size: 13px;
            color: #666;
            cursor: pointer;
            padding: 8px 12px;
        }

        .tab-action:hover {
            color: #1e9a6c;
        }

        .search-panel {
            padding: 15px;
            border-bottom: 1px solid #e8f8f0;
        }

        .search-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-item label {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
        }

        .search-item input,
        .search-item select {
            padding: 6px 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 14px;
            min-width: 180px;
        }

        .search-item select {
            min-width: 150px;
        }

        .search-actions {
            margin-left: auto;
            display: flex;
            gap: 10px;
        }

        .table-panel {
            padding: 15px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .table-actions {
            display: flex;
            gap: 10px;
        }

        .table-container {
            overflow-x: auto;
            border: 1px solid #e8f8f0;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #f0f5f2;
            font-size: 13px;
        }

        th {
            background: #fafdfb;
            font-weight: bold;
            color: #333;
        }

        td {
            color: #666;
        }

        tr:hover {
            background: #fafdfb;
        }

        .checkbox-cell input {
            width: 16px;
            height: 16px;
        }

        .action-links {
            display: flex;
            gap: 15px;
        }

        .action-link {
            color: #1e9a6c;
            text-decoration: none;
            font-size: 13px;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: #fafdfb;
            border-top: 1px solid #e8f8f0;
        }

        .pagination-info {
            font-size: 13px;
            color: #666;
        }

        .pagination-nav {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pagination-nav button {
            padding: 4px 10px;
            border: 1px solid #d9d9d9;
            background: white;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
        }

        .pagination-nav button:hover:not(:disabled) {
            border-color: #1e9a6c;
            color: #1e9a6c;
        }

        .pagination-nav button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-nav button.active {
            background: #1e9a6c;
            color: white;
            border-color: #1e9a6c;
        }

        .pagination-select {
            padding: 4px 8px;
            border: 1px solid #d9d9d9;
            border-radius: 3px;
            font-size: 13px;
        }

        .expand-btn {
            font-size: 13px;
            color: #1e9a6c;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .expand-btn:hover {
            text-decoration: underline;
        }

        .mark-btn {
            padding: 4px 10px;
            border: 1px solid #1e9a6c;
            background: white;
            color: #1e9a6c;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .mark-btn:hover {
            background: #e8f8f0;
        }
    </style>
</head>
<body>
    <div class="tabs-container">
        <div class="tabs-header">
            <div class="tab active">
                <span>市场信息查询</span>
                <span class="tab-close">×</span>
            </div>
            <div class="tab">
                <span>商户信息查询</span>
                <span class="tab-close">×</span>
            </div>
            <div class="tab">
                <span>交易信息查询</span>
                <span class="tab-close">×</span>
            </div>
            <div class="tabs-actions">
                <span class="tab-action">关闭全部</span>
                <span class="tab-action">关闭其他</span>
            </div>
        </div>

        <div class="search-panel">
            <div class="search-row">
                <div class="search-item">
                    <label>市场名称:</label>
                    <input type="text" placeholder="请输入">
                </div>
                <div class="search-item">
                    <label>统一社会信用代码:</label>
                    <input type="text" placeholder="请输入统一社会信用代码">
                </div>
                <div class="search-item">
                    <label>地址:</label>
                    <input type="text" placeholder="请输入地址">
                </div>
            </div>
            <div class="search-row" style="margin-top:10px">
                <div class="search-item">
                    <label>市场类型:</label>
                    <select>
                        <option value="">请输入</option>
                        <option value="1">零售市场</option>
                        <option value="2">批发市场</option>
                        <option value="3">农贸市场</option>
                    </select>
                </div>
                <div class="search-item">
                    <label>生产企业(发货方):</label>
                    <input type="text" placeholder="请输入生产企业(发货方)">
                </div>
                <div class="search-actions">
                    <button class="btn btn-primary">
                        <span>🔍</span>
                        <span>查询</span>
                    </button>
                    <button class="btn btn-secondary">
                        <span>↻</span>
                        <span>重置</span>
                    </button>
                    <span class="expand-btn">
                        <span>展开</span>
                        <span>▼</span>
                    </span>
                </div>
            </div>
        </div>

        <div class="table-panel">
            <div class="table-header">
                <button class="mark-btn">
                    <span>📌</span>
                    <span>标记</span>
                </button>
                <div class="table-actions">
                    <button class="btn btn-secondary">查询配置</button>
                    <button class="btn btn-secondary">表格配置</button>
                    <button class="btn btn-primary">
                        <span>📥</span>
                        <span>导出</span>
                    </button>
                </div>
            </div>

            <div class="table-container">
                <table id="marketTable">
                    <thead>
                        <tr>
                            <th class="checkbox-cell"><input type="checkbox" onchange="toggleAllCheckboxes(this)"></th>
                            <th>序号</th>
                            <th>市场名称</th>
                            <th>统一社会信用代码</th>
                            <th>地址</th>
                            <th>市场类型</th>
                            <th>商户数量</th>
                            <th>已确认/进场报备总数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
        const pageType = 'market';

        const marketData = [
            { id: '1', marketName: '北京丰富农贸市场有限...', creditCode: '9111022845223...', address: '北京市密云区溪翁庄镇...', marketType: '零售市场', merchantCount: 8, reportCount: '260/270' },
            { id: '2', marketName: '北京民源福农贸市场中...', creditCode: '9111022845223...', address: '北京市密云区溪翁庄镇...', marketType: '零售市场', merchantCount: 5, reportCount: '260/270' },
            { id: '3', marketName: '北京万发恒顺农贸市场...', creditCode: '9111022845223...', address: '北京市密云区溪翁庄镇...', marketType: '零售市场', merchantCount: 4, reportCount: '260/270' },
            { id: '4', marketName: '北京市鑫绿都农副产品...', creditCode: '9111022845223...', address: '北京市密云区溪翁庄镇...', marketType: '零售市场', merchantCount: 2, reportCount: '260/270' },
            { id: '5', marketName: '北京市测试', creditCode: '9111022845223...', address: '北京市密云区溪翁庄镇...', marketType: '零售市场', merchantCount: 9, reportCount: '260/270' },
            { id: '6', marketName: '北京市测试', creditCode: '9111022845223...', address: '北京市密云区溪翁庄镇...', marketType: '零售市场', merchantCount: 6, reportCount: '260/270' },
            { id: '7', marketName: '北京市测试', creditCode: '9111022845223...', address: '北京市密云区溪翁庄镇...', marketType: '零售市场', merchantCount: 1, reportCount: '260/270' },
            { id: '8', marketName: '北京市测试', creditCode: '9111022845223...', address: '北京市密云区溪翁庄镇...', marketType: '零售市场', merchantCount: 7, reportCount: '260/270' },
            { id: '9', marketName: '北京市测试', creditCode: '9111022845223...', address: '北京市密云区溪翁庄镇...', marketType: '零售市场', merchantCount: 7, reportCount: '260/270' },
            { id: '10', marketName: '北京市测试', creditCode: '9111022845223...', address: '北京市密云区溪翁庄镇...', marketType: '零售市场', merchantCount: 7, reportCount: '260/270' }
        ];

        // 初始化页面管理
        PageManager.init(pageType, marketData);

        function renderTable(pageType) {
            const tbody = document.getElementById('tableBody');
            const data = PageManager.getPageData(pageType);

            let html = '';
            data.forEach((item, index) => {
                html += '<tr>';
                html += `<td class="checkbox-cell"><input type="checkbox" data-id="${item.id}"></td>`;
                html += `<td>${(PageManager.currentPage[pageType] - 1) * PageManager.pageSize[pageType] + index + 1}</td>`;
                html += `<td>${item.marketName}</td>`;
                html += `<td>${item.creditCode}</td>`;
                html += `<td>${item.address}</td>`;
                html += `<td>${item.marketType}</td>`;
                html += `<td>${item.merchantCount}</td>`;
                html += `<td>${item.reportCount}</td>`;
                html += '<td><div class="action-links">';
                html += '<a href="#" class="action-link">标记</a>';
                html += '<a href="#" class="action-link">标记历史</a>';
                html += '</div></td></tr>';
            });

            tbody.innerHTML = html;
        }

        function renderPagination(pageType) {
            const pagination = document.getElementById('pagination');
            const currentPage = PageManager.currentPage[pageType];
            const totalPages = PageManager.getTotalPages(pageType);
            const totalCount = PageManager.data[pageType].length;
            const pageSize = PageManager.pageSize[pageType];

            pagination.innerHTML = PaginationTemplate.render(pageType, currentPage, totalPages, totalCount, pageSize);
        }

        // 页面加载完成后渲染
        document.addEventListener('DOMContentLoaded', function() {
            renderTable(pageType);
            renderPagination(pageType);
        });
    </script>
</body>
</html>
